# Nono GenAI Framework Configuration

[google]
default_model = "gemini-3-flash-preview"

[openai]
default_model = "gpt-4o-mini"

[perplexity]
default_model = "sonar"

[deepseek]
default_model = "deepseek-chat"

[grok]
default_model = "grok-1"

[groq]
default_model = "llama-3.3-70b-versatile"

[cerebras]
default_model = "llama-3.3-70b"

[nvidia]
default_model = "meta/llama-3.3-70b-instruct"

[openrouter]
default_model = "openrouter/auto"

[foundry]
default_model = "openai/gpt-4o"

[vercel]
default_model = "anthropic/claude-opus-4.5"

[ollama]
host = "http://localhost:11434"  # Default Ollama host
default_model = "llama3"

[rate_limits]
delay_between_requests = 0.5

[paths]
# Directory containing Jinja2 templates (.j2 files)
# If relative, resolved from project root. Leave empty for default (nono/tasker/templates)
templates_dir = ""

# Directory containing task definition files (.json)
# If relative, resolved from project root. Leave empty for default (nono/tasker/prompts)
prompts_dir = ""

[agent.factory]
# Dynamic agent creation from natural language descriptions.
# SECURITY: Disabled by default. Enable only when needed.
allow_dynamic_creation = false

# Maximum number of tools a generated agent can use
max_tools_per_agent = 10

# Maximum system prompt length (characters) for generated agents
max_instruction_length = 4000

# Default provider/model for the factory's own LLM calls
default_provider = "google"
# default_model = ""  # uses provider default when empty

# Restrict which providers generated agents may use (empty = all allowed)
# allowed_providers = ["google", "openai"]

# Restrict which tools generated agents may use (empty = all available)
# tool_allowlist = ["get_weather", "search_db"]
