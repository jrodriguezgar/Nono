# Nono GenAI Framework Configuration

[google]
default_model = "gemini-3-flash-preview"

[openai]
default_model = "gpt-4o-mini"

[perplexity]
default_model = "sonar"

[deepseek]
default_model = "deepseek-chat"

[xai]
default_model = "grok-3"

[groq]
default_model = "llama-3.3-70b-versatile"

[cerebras]
default_model = "llama-3.3-70b"

[nvidia]
default_model = "meta/llama-3.3-70b-instruct"

[github]
default_model = "openai/gpt-5"

[openrouter]
default_model = "openrouter/auto"

[foundry]
default_model = "openai/gpt-4o"

[huggingface]
default_model = "meta-llama/Llama-3.3-70B-Instruct"

[vercel]
default_model = "anthropic/claude-opus-4.5"

[ollama]
host = "http://localhost:11434"  # Default Ollama host
default_model = "llama3"

[rate_limits]
delay_between_requests = 0.5

[agent]
# Default provider for LlmAgent and RouterAgent routing calls
default_provider = "google"
# Default model (empty = use provider's default from [provider].default_model)
default_model = ""
# Default temperature for agent LLM calls
temperature = 0.7
# Maximum tokens for agent responses
max_tokens = 4096
# RouterAgent: default max iterations for loop mode
router_max_iterations = 3
# RouterAgent: temperature for routing decisions (lower = more deterministic)
router_temperature = 0.0
# Maximum tool-call loop iterations to prevent infinite loops
max_tool_iterations = 10
# Maximum messages in tool-calling loop to avoid context overflow
max_loop_messages = 40
# Maximum depth for recursive agent transfers (prevents stack overflow)
max_transfer_depth = 10

[fallback]
# Automatic provider/model fallback when the primary provider fails.
enabled = true
# Maximum retry attempts per provider before falling back to the next one.
max_retries = 1
# Timeout in seconds for each provider attempt (0 = no timeout override).
timeout = 30

# Fallback chain — tried in order when the active provider fails.
# Each entry needs a provider name and an optional model override
# (empty model = use [provider].default_model from above).

[[fallback.chain]]
provider = "google"
model = "gemini-3-flash-preview"

[[fallback.chain]]
provider = "groq"
model = "llama-3.3-70b-versatile"

[[fallback.chain]]
provider = "openai"
model = "gpt-4o-mini"

[[fallback.chain]]
provider = "deepseek"
model = "deepseek-chat"

[[fallback.chain]]
provider = "openrouter"
model = "openrouter/auto"

[sandbox]
# Default sandbox provider: "e2b", "modal", "daytona", "blaxel",
# "cloudflare", "runloop", "vercel"
default_provider = "e2b"
# Default execution timeout in seconds
timeout = 300
# Working directory inside the sandbox
working_dir = "/home/user"
# Keep sandbox alive after execution for inspection
keep_alive = false
# Enable state snapshots for durability / rehydration
snapshot = false

[executer]
# Code execution mode: "subprocess" (isolated) or "exec" (in-process)
mode = "subprocess"
# Security mode: "safe" (blocks dangerous ops) or "permissive" (allows all)
security = "safe"
# Timeout in seconds for code execution
timeout = 30
# Maximum retry attempts for failed executions
max_retries = 2
# Save execution results to disk
save_executions = true

[cli]
# Enable ANSI color output
colors_enabled = true
# Default output format: "summary", "json", "text", "table"
default_output_format = "summary"
# Default log level: "debug", "info", "warning", "error"
default_log_level = "info"
# Default AI provider for CLI commands
default_provider = "google"
# Allow reading arguments from @file
allow_parameter_files = true
# Ask confirmation before executing
require_confirmation = false
# Run in dry-run mode by default
dry_run_by_default = false
# Default timeout in seconds
default_timeout = 60
# Default maximum tokens for responses
default_max_tokens = 4096

[workflow]
# Enable logging of step transitions
log_steps = true
# Default input_key for tasker_node / agent_node
default_input_key = "input"
# Default output_key for tasker_node / agent_node
default_output_key = "output"

[paths]
# Directory containing Jinja2 templates (.j2 files)
# If relative, resolved from project root. Leave empty for default (nono/tasker/templates)
templates_dir = ""

# Directory containing task definition files (.json)
# If relative, resolved from project root. Leave empty for default (nono/tasker/prompts)
prompts_dir = ""

# =============================================================================
# MCP Servers — Model Context Protocol
# =============================================================================
# Register external MCP servers to use their tools inside Nono agents.
# Install: pip install nono[mcp]
# Manage via CLI: nono mcp list | nono mcp add | nono mcp remove
#
# [[mcp.servers]]
# name = "filesystem"
# transport = "stdio"            # "stdio", "http", or "sse"
# command = "uvx"                # executable (stdio only)
# args = ["mcp-server-filesystem", "/home/user/docs"]
# env = {}                       # environment variables (stdio only)
# timeout = 30.0                 # connection timeout in seconds
# enabled = true                 # set to false to disable without removing
#
# [[mcp.servers]]
# name = "my-api"
# transport = "http"
# url = "http://localhost:8000/mcp"
# headers = { Authorization = "Bearer <token>" }

[mcp]
# No servers configured by default.
# Use 'nono mcp add <name> --command <cmd> --args <arg1> <arg2>' to add one.

