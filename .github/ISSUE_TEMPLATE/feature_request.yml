name: Feature Request
description: Suggest a new function or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: dropdown
    id: module
    attributes:
      label: Target module
      description: Which module should this belong to?
      options:
        - fxDate
        - fxExcel
        - fxNumeric
        - fxPython
        - fxString
        - fxVBA
        - New module
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the function or feature you'd like.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: How would you call this function?
      render: python
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've considered.
    validations:
      required: false
