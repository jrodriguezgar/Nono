services:
  nono-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nono-api
    ports:
      - "8000:8000"
    environment:
      # ── Required: at least one provider API key ──
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      # ── Optional: default provider ──
      - NONO_DEFAULT_PROVIDER=${NONO_DEFAULT_PROVIDER:-google}
      - NONO_DEFAULT_MODEL=${NONO_DEFAULT_MODEL:-}
    volumes:
      - nono-output:/app/output
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Optional: local Ollama for offline inference ──
  # Uncomment to run a local LLM alongside Nono.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: nono-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped

volumes:
  nono-output:
  # ollama-data:
